server:
  port: 8080

spring:
  application:
    name: vaultcore-financial

  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:vaultcore_app}
    username: ${DB_USER:vaultcore}
    password: ${DB_PASSWORD:vaultcore_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
    open-in-view: false
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:9090/realms/vaultcore}
          jwk-set-uri: ${KEYCLOAK_JWK_URI:http://localhost:9090/realms/vaultcore/protocol/openid-connect/certs}
      client:
        registration:
          keycloak:
            client-id: ${KEYCLOAK_CLIENT_ID:vaultcore-app}
            client-secret: ${KEYCLOAK_CLIENT_SECRET:vaultcore-secret}
            scope: openid,profile,email
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:9090/realms/vaultcore}
            user-name-attribute: preferred_username

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# Application-specific config
app:
  fraud:
    threshold: 10000.00
    otp-ttl-seconds: 300
  cache:
    balance-ttl-seconds: 30
    stock-ttl-seconds: 5
  statement:
    encryption-key: ${STATEMENT_ENC_KEY:VaultCoreAES128K}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.vaultcore: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
