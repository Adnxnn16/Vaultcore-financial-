<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>VaultCore Financial | Secure Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                "secondary": "#425ca0",
                "surface-container-highest": "#dfe3e7",
                "tertiary": "#a33200",
                "surface-container-high": "#e4e9ed",
                "on-tertiary-fixed-variant": "#832600",
                "primary-fixed-dim": "#b3c5ff",
                "surface-tint": "#0054d6",
                "tertiary-fixed": "#ffdbd0",
                "on-error": "#ffffff",
                "surface-variant": "#dfe3e7",
                "surface-container-lowest": "#ffffff",
                "tertiary-fixed-dim": "#ffb59d",
                "on-surface-variant": "#424656",
                "secondary-container": "#9bb4fe",
                "inverse-surface": "#2c3134",
                "surface": "#f6fafe",
                "error-container": "#ffdad6",
                "primary-container": "#0066ff",
                "on-secondary-fixed": "#001849",
                "surface-container": "#eaeef2",
                "tertiary-container": "#cc4204",
                "on-background": "#171c1f",
                "on-primary-fixed-variant": "#003fa4",
                "primary": "#0050cb",
                "error": "#ba1a1a",
                "primary-fixed": "#dae1ff",
                "on-tertiary": "#ffffff",
                "on-tertiary-container": "#fff6f4",
                "inverse-primary": "#b3c5ff",
                "secondary-fixed-dim": "#b3c5ff",
                "surface-bright": "#f6fafe",
                "on-tertiary-fixed": "#390c00",
                "on-primary-container": "#f8f7ff",
                "on-secondary-container": "#294487",
                "on-secondary-fixed-variant": "#284386",
                "inverse-on-surface": "#edf1f5",
                "on-primary": "#ffffff",
                "outline-variant": "#c2c6d8",
                "secondary-fixed": "#dae1ff",
                "surface-dim": "#d6dade",
                "on-surface": "#171c1f",
                "on-primary-fixed": "#001849",
                "on-error-container": "#93000a",
                "outline": "#727687",
                "background": "#f6fafe",
                "on-secondary": "#ffffff",
                "surface-container-low": "#f0f4f8"
            },
            "borderRadius": {
                "DEFAULT": "0.25rem",
                "lg": "0.5rem",
                "xl": "0.75rem",
                "full": "9999px"
            },
            "fontFamily": {
                "headline": ["Inter"],
                "body": ["Inter"],
                "label": ["Inter"]
            }
          },
        }
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-atrium-mesh {
            background-color: #f6fafe;
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 102, 255, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 80, 203, 0.08) 0px, transparent 50%);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="bg-atrium-mesh min-h-screen flex items-center justify-center p-6 selection:bg-primary-fixed selection:text-on-primary-fixed-variant">
<!-- Primary Login Canvas -->
<main class="w-full max-w-[440px] relative">
<!-- Decorative Ambient Light -->
<div class="absolute -top-24 -left-24 w-64 h-64 bg-primary/10 rounded-full blur-[80px]"></div>
<div class="absolute -bottom-24 -right-24 w-64 h-64 bg-secondary-container/20 rounded-full blur-[80px]"></div>
<div class="relative glass-panel bg-surface-container-lowest rounded-[2rem] p-10 md:p-12 shadow-[0px_20px_40px_rgba(0,80,203,0.06)] border border-white/40">
<!-- Brand Identity -->
<div class="flex flex-col items-center mb-10">
<div class="w-14 h-14 bg-gradient-to-br from-primary to-primary-container rounded-2xl flex items-center justify-center mb-6 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-on-primary text-3xl" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
</div>
<h1 class="text-2xl font-extrabold tracking-tight text-on-surface mb-1">VaultCore Financial</h1>
<p class="text-on-surface-variant text-sm font-medium">Secure Access to Your Wealth</p>
</div>
<!-- Secure Badge -->
<div class="flex justify-center mb-8">
<div class="inline-flex items-center gap-2 px-3 py-1.5 bg-surface-container rounded-full">
<span class="material-symbols-outlined text-primary text-[18px]" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<span class="text-[11px] font-bold uppercase tracking-widest text-primary">Secure Login</span>
</div>
</div>
<!-- Login Form -->
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="text-[11px] font-bold uppercase tracking-wider text-on-surface-variant ml-1">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container border-none rounded-xl text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all outline-none text-sm font-medium" placeholder="name@vaultcore.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-[11px] font-bold uppercase tracking-wider text-on-surface-variant">Password</label>
<a class="text-[11px] font-bold text-primary hover:underline decoration-2 underline-offset-4" href="#">Forgot?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container border-none rounded-xl text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all outline-none text-sm font-medium" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-4 flex items-center text-outline hover:text-on-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Action Button -->
<button class="w-full py-4 bg-gradient-to-r from-primary to-primary-container text-on-primary rounded-full font-bold text-sm shadow-xl shadow-primary/25 hover:scale-[1.02] active:scale-[0.98] transition-all duration-200 mt-2" type="submit">
                    Sign Into Vault
                </button>
</form>
<!-- Footer Actions -->
<div class="mt-10 pt-8 border-t border-outline-variant/20 flex flex-col items-center gap-4">
<p class="text-sm text-on-surface-variant">
                    New to the platform? 
                    <a class="text-primary font-bold hover:text-primary-container transition-colors ml-1" href="#">Create Account</a>
</p>
<!-- Biometric Mockup -->
</div>
</div>
<!-- Trust Signals -->
<div class="mt-8 flex justify-center items-center gap-8 opacity-60">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[16px] text-on-surface-variant">encrypted</span>
<span class="text-[10px] font-semibold text-on-surface-variant tracking-wider uppercase">AES-256 Encrypted</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[16px] text-on-surface-variant">verified</span>
<span class="text-[10px] font-semibold text-on-surface-variant tracking-wider uppercase">FINRA Regulated</span>
</div>
</div>
</main>
<!-- Support Link Floating -->
<div class="fixed bottom-8 right-8">
<button class="flex items-center gap-3 px-4 py-3 bg-white shadow-lg rounded-full border border-outline-variant/10 text-on-surface-variant hover:text-primary transition-all group">
<span class="material-symbols-outlined text-[20px] text-primary">support_agent</span>
<span class="text-xs font-bold">Priority Support</span>
</button>
</div>
</body></html>
